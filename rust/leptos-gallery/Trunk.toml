# Generate the Aurora Dark stylesheet before trunk processes assets, so the
# <link> in index.html resolves. Dogfoods aurora_leptos::write_css (via the
# leptos-free `aurora-css` bin). `-p aurora-leptos` works because this gallery is
# a workspace member; an external consumer would `cargo install` the bin (or use
# cargo-leptos + build.rs). See the crate README.
[[hooks]]
stage = "pre_build"
command = "cargo"
command_arguments = [
  "run", "-q", "-p", "aurora-leptos",
  "--no-default-features", "--features", "bin",
  "--bin", "aurora-css",
  # Separate target dir so generating the CSS can't churn trunk's wasm build.
  "--target-dir", "target/_aurora_css",
  "--", "style",
]

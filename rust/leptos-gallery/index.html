<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aurora Dark · Leptos gallery</title>
    <!-- Aurora Dark stylesheet, emitted by build.rs (aurora_leptos::write_css). -->
    <link data-trunk rel="css" href="style/aurora.css" />
    <!-- gallery-only chrome (not part of the design system) -->
    <link data-trunk rel="css" href="gallery.css" />
    <!-- Identical wasm-opt setting on both galleries for a fair size comparison. -->
    <link data-trunk rel="rust" data-wasm-opt="z" data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int" />
  </head>
  <body></body>
</html>
